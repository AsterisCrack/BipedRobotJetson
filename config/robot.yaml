urdf_path: "RobotDescription/urdf/robot_flat.urdf"
home_pose: stand

# Servo ID assignment:
#   Left leg:  1=l_hip_yaw, 2=l_hip_roll, 3=l_hip_pitch, 4=l_knee, 5=l_ankle_roll, 6=l_ankle_pitch
#   Right leg: 7=r_hip_yaw, 8=r_hip_roll, 9=r_hip_pitch, 10=r_knee, 11=r_ankle_roll, 12=r_ankle_pitch
#
# direction_sign: +1 or -1 — maps physical servo rotation to URDF joint convention
# zero_offset_steps: raw encoder count (0-4095) when joint is at 0 degrees

servos:
  - servo_id: 13
    joint_name: l_hip_yaw
    direction_sign: -1
    zero_offset_steps: 2048
    default_position_deg: 47.0 
    pid: {p: 32, d: 16, i: 0}

  - servo_id: 2
    joint_name: l_hip_roll_joint
    direction_sign: 1
    zero_offset_steps: 2048
    default_position_deg: 77.0
    pid: {p: 32, d: 16, i: 0}

  - servo_id: 3
    joint_name: l_hip_pitch_joint
    direction_sign: 1
    zero_offset_steps: 2048
    default_position_deg: -37.0
    pid: {p: 32, d: 16, i: 0}

  - servo_id: 4
    joint_name: l_knee_joint
    direction_sign: -1
    zero_offset_steps: 2048
    default_position_deg: 141
    pid: {p: 32, d: 16, i: 0}

  - servo_id: 5
    joint_name: l_ankle_roll_joint
    direction_sign: -1
    zero_offset_steps: 2048
    default_position_deg: -6.5
    pid: {p: 32, d: 16, i: 0}

  - servo_id: 6
    joint_name: l_ankle_pitch_joint
    direction_sign: 1
    zero_offset_steps: 2048
    default_position_deg: 17.0
    pid: {p: 32, d: 16, i: 0}

  - servo_id: 7
    joint_name: r_hip_yaw
    direction_sign: -1
    zero_offset_steps: 2048
    default_position_deg: -5.0
    pid: {p: 32, d: 16, i: 0}

  - servo_id: 8
    joint_name: r_hip_roll_joint
    direction_sign: -1
    zero_offset_steps: 2048
    default_position_deg: 8.0
    pid: {p: 32, d: 16, i: 0}

  - servo_id: 9
    joint_name: r_hip_pitch_joint
    direction_sign: 1
    zero_offset_steps: 2048
    default_position_deg: 31.0
    pid: {p: 32, d: 16, i: 0}

  - servo_id: 10
    joint_name: r_knee_joint
    direction_sign: 1
    zero_offset_steps: 2048
    default_position_deg: 4.5
    pid: {p: 32, d: 16, i: 0}

  - servo_id: 11
    joint_name: r_ankle_roll_joint
    direction_sign: -1
    zero_offset_steps: 2048
    default_position_deg: -6.0
    pid: {p: 32, d: 16, i: 0}

  - servo_id: 12
    joint_name: r_ankle_pitch_joint
    direction_sign: 1
    zero_offset_steps: 2048
    default_position_deg: 45
    pid: {p: 32, d: 16, i: 0}

poses:
  stand:
    l_hip_yaw: 0.0
    l_hip_roll_joint: 0.0
    l_hip_pitch_joint: 0.0
    l_knee_joint: 0.0
    l_ankle_roll_joint: 0.0
    l_ankle_pitch_joint: 0.0
    r_hip_yaw: 0.0
    r_hip_roll_joint: 0.0
    r_hip_pitch_joint: 0.0
    r_knee_joint: 0.0
    r_ankle_roll_joint: 0.0
    r_ankle_pitch_joint: 0.0

  crouch:
    l_hip_yaw: 0.0
    l_hip_roll_joint: 0.0
    l_hip_pitch_joint: -30.0
    l_knee_joint: 60.0
    l_ankle_roll_joint: 0.0
    l_ankle_pitch_joint: -30.0
    r_hip_yaw: 0.0
    r_hip_roll_joint: 0.0
    r_hip_pitch_joint: -30.0
    r_knee_joint: 60.0
    r_ankle_roll_joint: 0.0
    r_ankle_pitch_joint: -30.0
